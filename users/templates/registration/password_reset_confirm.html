<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - CV Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        p { color: #555; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 2px solid #e0e0e0; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #5a67d8; }
        .error { color: red; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        {% if validlink %}
            <h2>Set a new password</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Change my password</button>
            </form>
        {% else %}
            <h2>Invalid Link</h2>
            <p class="error">The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</p>
            <a href="{% url 'password_reset' %}">Request new link</a>
        {% endif %}
    </div>
</body>
</html>
