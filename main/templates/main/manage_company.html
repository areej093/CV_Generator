{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Company - CV Navigator</title>
    <link rel="stylesheet" href="{% static 'main/css/premium.css' %}">
    <style>
        .settings-container {
            max-width: 800px;
            margin: 60px auto 100px;
            padding: 0 40px;
        }

        .settings-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            box-shadow: var(--shadow-premium);
            border: 1px solid var(--border-light);
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-header);
        }

        input, textarea {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .logo-preview {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: #f1f5f9;
            margin-bottom: 20px;
            object-fit: cover;
            border: 1px solid var(--border-light);
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-brand">COMPANY SETTINGS</div>
        <a href="{% url 'cv_dashboard' %}" style="text-decoration: none; color: var(--text-body); font-weight: 600;">Dashboard</a>
    </nav>

    <div class="settings-container">
        <div class="settings-card fade-in">
            <h1 style="font-size: 32px; margin-bottom: 10px;">Company Profile</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Tell us about your brand to attract the best talent.</p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="name" value="{{ company.name }}" placeholder="e.g. Acme Tech Corp">
                </div>

                <div class="form-group">
                    <label>Corporate Description</label>
                    <textarea name="description" rows="5" placeholder="Share your mission and culture...">{{ company.description }}</textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Website URL</label>
                        <input type="url" name="website" value="{{ company.website }}" placeholder="https://acme.com">
                    </div>
                    <div class="form-group">
                        <label>Headquarters Location</label>
                        <input type="text" name="location" value="{{ company.location }}" placeholder="e.g. San Francisco, CA">
                    </div>
                </div>

                <div class="form-group">
                    <label>Hiring Contact Email</label>
                    <input type="email" name="contact_email" value="{{ company.contact_email }}" placeholder="hiring@acme.com">
                </div>

                <button type="submit" class="btn-premium" style="width: 100%; justify-content: center; margin-top: 20px;">
                    ✨ Save Profile Changes
                </button>
            </form>
        </div>
    </div>
</body>
</html>
