{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job Offer - CV Navigator</title>
    <link rel="stylesheet" href="{% static 'main/css/premium.css' %}">
    <style>
        .form-container {
            max-width: 800px;
            margin: 60px auto 100px;
            padding: 0 40px;
        }

        .form-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            box-shadow: var(--shadow-premium);
            border: 1px solid var(--border-light);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-header);
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            transition: var(--transition);
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-brand">RECRUITMENT PORTAL</div>
        <a href="{% url 'cv_dashboard' %}" style="text-decoration: none; color: var(--text-body); font-weight: 600;">Dashboard</a>
    </nav>

    <div class="form-container">
        <div class="form-card fade-in">
            <h1 style="font-size: 32px; margin-bottom: 10px;">Post a New Offer</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Reach thousands of qualified candidates in minutes.</p>

            <form method="POST">
                {% csrf_token %}
                
                <h3 class="section-title">📋 Basic Information</h3>
                
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" name="title" required placeholder="e.g. Senior Frontend Developer">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" required placeholder="e.g. Remote or Paris, FR">
                    </div>
                    <div class="form-group">
                        <label>Offer Type</label>
                        <select name="offer_type" required>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Internship">Internship</option>
                            <option value="Freelance">Freelance</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Salary Range (Optional)</label>
                    <input type="text" name="salary_range" placeholder="e.g. €45k - €65k">
                </div>

                <h3 class="section-title" style="margin-top: 40px;">📄 Job Details</h3>

                <div class="form-group">
                    <label>AI Matching Requirements (Keywords)</label>
                    <textarea name="requirements" rows="4" placeholder="List key skills for AI matching (e.g. React, Python, Docker)..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Full Job Description</label>
                    <textarea name="description" rows="8" placeholder="Describe the role, team, and what you're looking for..." required></textarea>
                </div>

                <button type="submit" class="btn-premium" style="width: 100%; justify-content: center; margin-top: 30px; font-size: 18px;">
                    🚀 Publish Job Listing
                </button>
            </form>
        </div>
    </div>
</body>
</html>
